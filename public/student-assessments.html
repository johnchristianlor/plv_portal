<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Assessments | PLV</title><link rel="icon" type="image/png" href="https://res.cloudinary.com/dfdlqf6ng/image/upload/v1772078917/PamantasanNgLungsodNgValenzuelaLogo_t53djy.png"><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>:root{--bg:#f0f4f8;--txt:#0f172a;--mut:#64748b;--card:rgba(255,255,255,.82);--line:rgba(100,116,139,.22);--blue:#003DA5;--light:rgba(0,61,165,.08);--red:#e11d48}.dark-theme{--bg:#040914;--txt:#f8fafc;--mut:#94a3b8;--card:rgba(10,15,30,.75);--line:rgba(255,255,255,.09);--blue:#3b82f6;--light:rgba(59,130,246,.16)}*{box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}body{margin:0;min-height:100vh;display:flex;background:var(--bg);color:var(--txt)}body:before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 10% 0,#cce0ff,transparent 35%),radial-gradient(circle at 90% 100%,#ffeb99,transparent 32%)}.sidebar{width:300px;height:100vh;position:sticky;top:0;padding:34px 22px;display:flex;flex-direction:column;background:rgba(255,255,255,.38);backdrop-filter:blur(24px);border-right:1px solid var(--line);overflow:auto}.logo{display:flex;align-items:center;gap:12px;margin-bottom:34px}.logo img{width:52px;height:52px;border-radius:50%}.logo h2{font-size:22px;margin:0}.logo p{margin:2px 0 0;color:var(--mut);font-size:11px;font-weight:800}.nav{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}.nav a{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--mut);padding:13px 16px;border-radius:16px;font-weight:700}.nav a.active,.nav a:hover{background:var(--blue);color:white}.wrap{flex:1;padding:36px 42px;min-width:0}.top{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px}.top h1{margin:0;font-size:32px}.top p{margin:4px 0;color:var(--mut);font-weight:700}.glass{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 20px 42px rgba(0,35,102,.08);backdrop-filter:blur(28px)}.theme{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:20px;cursor:pointer}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.tab{border:0;border-radius:999px;padding:10px 15px;background:var(--card);color:var(--mut);font-weight:900;cursor:pointer}.tab.active{background:var(--blue);color:white}.list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.card{padding:18px;display:grid;gap:12px}.badge{display:inline-flex;border-radius:999px;background:var(--light);color:var(--blue);padding:6px 10px;font-size:11px;font-weight:900;text-transform:uppercase}.meta{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:900;display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:var(--blue);color:white}.btn.secondary{background:var(--light);color:var(--blue)}.btn:disabled{opacity:.5;cursor:not-allowed}.exam{display:none}.exam.show{display:block}.qbox{padding:24px;display:grid;gap:16px}.choice{border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:10px;font-weight:750;background:rgba(255,255,255,.45);margin-bottom:8px}.dark-theme .choice{background:rgba(15,23,42,.4)}textarea{width:100%;min-height:150px;border:1px solid var(--line);background:rgba(255,255,255,.65);color:var(--txt);border-radius:14px;padding:12px;font-weight:700;resize:vertical}.dark-theme textarea{background:rgba(15,23,42,.7)}.timer{font-weight:900;color:var(--red);background:rgba(225,29,72,.1);padding:10px 14px;border-radius:999px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.toast{position:fixed;right:22px;bottom:22px;background:var(--txt);color:var(--bg);padding:13px 17px;border-radius:15px;font-weight:900;transform:translateY(120px);transition:.25s}.toast.show{transform:translateY(0)}.mobile{display:none}@media(max-width:980px){body{display:block}.sidebar{display:none}.wrap{padding:22px 16px 90px}.mobile{display:block;position:fixed;left:0;right:0;bottom:0;background:var(--card);backdrop-filter:blur(22px);border-top:1px solid var(--line);padding:8px;z-index:20}.mobile div{display:flex;gap:4px;overflow:auto}.mobile a{padding:9px 12px;border-radius:14px;text-decoration:none;color:var(--mut);font-size:11px;font-weight:800}.mobile a.active{background:var(--light);color:var(--blue)}}</style></head><body>
<aside class="sidebar"><div class="logo"><img src="https://res.cloudinary.com/dfdlqf6ng/image/upload/v1772078917/PamantasanNgLungsodNgValenzuelaLogo_t53djy.png"><div><h2>PLV</h2><p>Pamantasan ng<br>Lungsod ng Valenzuela</p></div></div><ul class="nav"><li><a href="student-dashboard.html"><i class="ph-fill ph-squares-four"></i>Dashboard</a></li><li><a class="active" href="student-assessments.html"><i class="ph-fill ph-clipboard-text"></i>Assessments</a></li><li><a href="student-scores.html"><i class="ph-fill ph-chart-bar"></i>Scores</a></li><li><a href="student-grades.html"><i class="ph ph-exam"></i>Grades</a></li><li><a href="student-attendance.html"><i class="ph-fill ph-calendar-dots"></i>Attendance</a></li><li><a href="student-settings.html"><i class="ph-fill ph-gear"></i>Settings</a></li><li style="margin-top:auto"><a onclick="window.logout()"><i class="ph ph-sign-out"></i>Logout</a></li></ul></aside>
<main class="wrap" id="portal"><header class="top"><div><h1>Assessments</h1><p>Take assigned quizzes and submit your answers securely.</p></div><button class="theme" id="themeToggle"><i class="ph-fill ph-sun"></i></button></header><div class="tabs"><button class="tab active" data-filter="active">Active</button><button class="tab" data-filter="upcoming">Upcoming</button><button class="tab" data-filter="completed">Completed</button><button class="tab" data-filter="all">All</button></div><section class="list" id="list"></section></main>
<main class="wrap exam" id="exam"><header class="top"><div><h1 id="examTitle">Assessment</h1><p id="examMeta"></p></div><div class="timer" id="timer">--:--</div></header><section class="glass qbox" id="qBox"></section><div class="actions"><button class="btn secondary" id="prev">Previous</button><button class="btn secondary" id="next">Next</button><button class="btn" id="submit">Submit</button></div></main><nav class="mobile"><div><a href="student-dashboard.html">Dashboard</a><a class="active" href="student-assessments.html">Assessments</a><a href="student-scores.html">Scores</a><a href="student-grades.html">Grades</a><a href="student-settings.html">Settings</a><a onclick="window.logout()">Logout</a></div></nav><div class="toast" id="toast"></div>
<script type="module">
import { supabase } from './supabase-adapter.js';import { startStudentPresence } from './student-presence.js';import { startStudentSessionGuard } from './student-session.js';
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const user=JSON.parse(localStorage.getItem('loggedInUser')||'null');if(!user||user.role!=='student')location.href='index.html';const presence=startStudentPresence(supabase,user),guard=startStudentSessionGuard(supabase,user);window.logout=async()=>{guard.stop();await presence.stop();localStorage.removeItem('loggedInUser');location.href='index.html'};let assessments=[],attempts=[],filter='active',current=null,questions=[],answers={},idx=0,deadline=0,timerId=null;function toast(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2400)}function theme(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-theme');$('themeToggle').onclick=()=>{document.body.classList.toggle('dark-theme');localStorage.setItem('theme',document.body.classList.contains('dark-theme')?'dark':'light')}}function st(a){const now=Date.now(),o=a.opens_at?new Date(a.opens_at).getTime():0,c=a.closes_at?new Date(a.closes_at).getTime():Infinity;if(attempts.some(x=>x.assessment_id===a.id&&x.status==='submitted'))return'completed';if(a.status!=='published'||(o&&now<o))return'upcoming';if(c&&now>c)return'closed';return'active'}
async function load(){const sec=user.section||'';const {data,error}=await supabase.from('assessments').select('*').in('status',['published','closed']).order('created_at',{ascending:false});if(error){$('list').innerHTML='<article class="glass card"><b>Assessments are not ready.</b><p>Please ask the admin to run supabase_assessments_secure.sql in Supabase.</p></article>';return}assessments=(data||[]).filter(a=>a.section==='ALL'||a.section===sec);const at=await supabase.from('assessment_attempts').select('*').eq('student_no',user.studentNo||user.username||'');attempts=at.data||[];render()}
function render(){const items=assessments.filter(a=>filter==='all'||st(a)===filter);$('list').innerHTML=items.length?items.map(a=>{const state=st(a),done=attempts.find(x=>x.assessment_id===a.id&&x.status==='submitted');return`<article class="glass card"><h3>${esc(a.title)}</h3><p style="color:var(--mut);font-weight:700">${esc(a.instructions||'No instructions provided.')}</p><div class="meta"><span class="badge">${esc(a.subject_code)}</span><span class="badge">${esc(a.section)}</span><span class="badge">${esc(state)}</span><span class="badge">${a.duration_minutes||0} min</span></div><p style="color:var(--mut);font-weight:700">Open: ${a.opens_at?new Date(a.opens_at).toLocaleString():'Anytime'}<br>Close: ${a.closes_at?new Date(a.closes_at).toLocaleString():'No close date'}</p>${done?`<p><b>Submitted:</b> ${new Date(done.submitted_at).toLocaleString()}</p>`:''}<button class="btn" data-start="${a.id}" ${state!=='active'?'disabled':''}>${done?'Submitted':'Start Assessment'}</button></article>`}).join(''):'<article class="glass card"><b>No assessments here.</b><p style="color:var(--mut);font-weight:700">Nothing matches this tab.</p></article>';document.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>start(b.dataset.start))}
async function start(id){current=assessments.find(a=>a.id===id);if(!current||st(current)!=='active')return toast('This assessment is not active.');const qs=await supabase.from('assessment_questions').select('*').eq('assessment_id',id).order('order_no');if(qs.error)return toast(qs.error.message);questions=[];for(const q of qs.data||[]){const cs=await supabase.from('assessment_choices').select('id,choice_text,order_no').eq('question_id',q.id).order('order_no');questions.push({...q,choices:cs.data||[]})}answers={};idx=0;deadline=Date.now()+Number(current.duration_minutes||30)*60000;$('portal').style.display='none';$('exam').classList.add('show');$('examTitle').textContent=current.title;$('examMeta').textContent=`${current.subject_code} • ${questions.length} questions`;renderQ();tick();timerId=setInterval(tick,1000)}function renderQ(){const q=questions[idx];if(!q){$('qBox').innerHTML='<p>No questions found.</p>';return}let body='';if(q.type==='essay'||q.type==='short_answer')body=`<textarea id="answerText" placeholder="Type your answer here.">${esc(answers[q.id]||'')}</textarea>`;else body=(q.choices||[]).map(c=>`<label class="choice"><input type="radio" name="choice" value="${esc(c.choice_text)}" ${answers[q.id]===c.choice_text?'checked':''}> <span>${esc(c.choice_text)}</span></label>`).join('');$('qBox').innerHTML=`<p style="color:var(--mut);font-weight:900">Question ${idx+1} of ${questions.length} • ${q.points} pt</p><h2>${esc(q.prompt)}</h2><div>${body}</div>`;$('prev').disabled=idx===0;$('next').disabled=idx===questions.length-1}function save(){const q=questions[idx];if(!q)return;if(q.type==='essay'||q.type==='short_answer')answers[q.id]=$('answerText')?.value||'';else answers[q.id]=document.querySelector('input[name="choice"]:checked')?.value||''}function tick(){const left=Math.max(0,deadline-Date.now()),m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);$('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;if(left<=0)submit(true)}async function submit(auto=false){save();if(!auto&&!confirm('Submit this assessment now?'))return;clearInterval(timerId);const started=new Date(deadline-Number(current.duration_minutes||30)*60000).toISOString();const payload={assessment_id:current.id,student_no:user.studentNo||user.username||'',student_name:user.studentName||user.fullName||user.name||'',student_uid:String(user.uid||user.id||''),status:'submitted',answers_json:answers,total_points:questions.reduce((n,q)=>n+Number(q.points||0),0),started_at:started,submitted_at:new Date().toISOString()};const {error}=await supabase.from('assessment_attempts').insert(payload);if(error){toast(error.message);tick();timerId=setInterval(tick,1000);return}toast('Assessment submitted.');$('exam').classList.remove('show');$('portal').style.display='block';await load()}
$('prev').onclick=()=>{save();idx=Math.max(0,idx-1);renderQ()};$('next').onclick=()=>{save();idx=Math.min(questions.length-1,idx+1);renderQ()};$('submit').onclick=()=>submit(false);document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');filter=t.dataset.filter;render()});theme();await load();
</script></body></html>
